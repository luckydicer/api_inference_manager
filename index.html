<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Inference Manager</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --success: #22c55e;
      --danger: #ef4444;
      --border: #334155;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
    }
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .api-key-modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      z-index: 1001;
    }
    .api-key-modal h2 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
    }
    .api-key-modal p {
      color: var(--text-secondary);
      font-size: 14px;
      text-align: center;
      margin-bottom: 24px;
    }
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      margin-bottom: 6px;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }
    button {
      padding: 12px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: var(--danger); font-size: 13px; margin-top: 8px; text-align: center; }
    .hidden { display: none !important; }
    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .sidebar {
      width: 280px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      height: 100vh;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header h1 {
      font-size: 16px;
      font-weight: 700;
    }
    .sidebar-provider {
      color: var(--accent);
      font-size: 12px;
      font-weight: 500;
      margin-top: 4px;
    }
    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
    }
    .nav-section {
      margin-bottom: 16px;
    }
    .nav-section-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 8px 12px 4px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 13px;
      transition: all 0.15s;
    }
    .nav-item:hover { background: var(--bg-tertiary); color: var(--text-primary); }
    .nav-item.active { background: var(--accent); color: white; }
    .nav-item .method {
      font-size: 10px;
      font-weight: 700;
      padding: 3px 6px;
      border-radius: 4px;
      text-transform: uppercase;
    }
    .method-get { background: rgba(34, 197, 94, 0.2); color: var(--success); }
    .method-post { background: rgba(99, 102, 241, 0.2); color: var(--accent); }
    .method-delete { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
    .nav-item.active .method { background: rgba(255,255,255,0.2); color: white; }
    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--border);
    }

    .main-content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .endpoint-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .endpoint-title {
      font-size: 20px;
      font-weight: 700;
    }
    .endpoint-path {
      font-family: monospace;
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .endpoint-desc {
      color: var(--text-secondary);
      font-size: 14px;
      margin-top: 8px;
      max-width: 600px;
    }
    .btn-secondary {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      color: var(--text-primary);
    }
    .btn-secondary:hover { background: var(--border); }

    .request-card, .response-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .output-box {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      min-height: 300px;
      max-height: 500px;
      overflow-y: auto;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 13px;
      line-height: 1.6;
    }
    .output-box pre { margin: 0; white-space: pre-wrap; word-break: break-word; }
    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .output-status {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
    }
    .output-status.success { background: rgba(34, 197, 94, 0.2); color: var(--success); }
    .output-status.error { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

    .fields-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
    }
    .field-group { margin-bottom: 16px; }
    .field-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .field-required {
      font-size: 10px;
      padding: 2px 5px;
      background: rgba(239, 68, 68, 0.2);
      color: var(--danger);
      border-radius: 4px;
    }
    .field-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    textarea {
      resize: vertical;
      min-height: 80px;
    }
    .btn-row {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }
    .json-input {
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 13px;
      min-height: 200px;
    }

    .model-select-wrapper {
      position: relative;
    }
    .model-select-input {
      cursor: pointer;
      background: var(--bg-tertiary) !important;
    }
    .model-select-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 8px;
      max-height: 300px;
      overflow-y: auto;
      z-index: 100;
      margin-top: 4px;
      display: none;
    }
    .model-select-dropdown.open { display: block; }
    .model-select-search {
      position: sticky;
      top: 0;
      background: var(--bg-tertiary);
      padding: 8px;
      border-bottom: 1px solid var(--border);
    }
    .model-select-search input {
      border-radius: 6px;
    }
    .model-option {
      padding: 10px 14px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.15s;
    }
    .model-option:hover { background: var(--bg-tertiary); }
    .model-option.selected { background: var(--accent); color: white; }
    .model-option-name { font-size: 13px; font-weight: 500; }
    .model-option-price { font-size: 11px; color: var(--text-muted); }
    .model-option.selected .model-option-price { color: rgba(255,255,255,0.7); }
    .model-option-id { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
    .model-option.selected .model-option-id { color: rgba(255,255,255,0.7); }
    .model-option-group {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      padding: 8px 14px 4px;
      text-transform: uppercase;
    }

    .request-response-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      flex: 1;
    }
    @media (max-width: 1024px) {
      .request-response-container {
        grid-template-columns: 1fr;
      }
    }
    .request-card, .response-card {
      display: flex;
      flex-direction: column;
    }
    .request-card .card-title,
    .response-card .output-header {
      flex-shrink: 0;
    }
    #requestFields {
      flex: 1;
      overflow-y: auto;
    }
    #responseBox {
      flex: 1;
      min-height: 0;
    }

    .advanced-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
      width: 100%;
      margin-bottom: 16px;
      transition: all 0.2s;
    }
    .advanced-toggle:hover { background: var(--border); color: var(--text-primary); }
    .advanced-toggle .arrow {
      transition: transform 0.2s;
      font-size: 10px;
    }
    .advanced-toggle.open .arrow { transform: rotate(90deg); }
    .advanced-toggle.open { background: var(--accent); color: white; border-color: var(--accent); }

    .advanced-fields {
      display: none;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      margin-top: 16px;
    }
    .advanced-fields.open { display: block; }

    .messages-field textarea {
      min-height: 200px;
    }
    .main-content {
      flex: 1;
      padding: 32px 40px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 24px;
      min-width: 0;
    }
    .sidebar {
      width: 300px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      height: 100vh;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .request-response-container {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 24px;
      flex: 1;
      min-height: 0;
    }
    @media (max-width: 1200px) {
      .request-response-container {
        grid-template-columns: 1fr 1fr;
      }
    }
    @media (max-width: 900px) {
      .request-response-container {
        grid-template-columns: 1fr;
      }
    }
    .request-card, .response-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      min-height: 500px;
    }
    .response-card {
      min-height: 400px;
    }
    #responseBox {
      flex: 1;
      min-height: 300px;
    }
    .output-box {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      overflow-y: auto;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 13px;
      line-height: 1.6;
      flex: 1;
    }
    .endpoint-header {
      padding-bottom: 8px;
    }
    .endpoint-title {
      font-size: 24px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="apiKeyModal" class="modal-overlay">
    <div class="api-key-modal">
      <h2>API Inference Manager</h2>
      <p>Enter your API key to get started</p>
      <div class="form-group">
        <label>Provider</label>
        <select id="providerSelect" onchange="updateKeyPlaceholder()">
          <option value="openrouter">OpenRouter</option>
          <option value="chutes">Chutes</option>
        </select>
      </div>
      <div class="form-group">
        <label>API Key</label>
        <input type="password" id="apiKeyInput" placeholder="sk-or-v1..." onkeydown="if(event.key==='Enter')submitApiKey()">
      </div>
      <button id="submitBtn" onclick="submitApiKey()">Continue</button>
      <div id="modalError" class="error hidden"></div>
    </div>
  </div>

  <div id="mainApp" class="hidden" style="display: flex;">
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>API Inference Manager</h1>
        <div class="sidebar-provider" id="sidebarProvider"></div>
      </div>
      <nav class="sidebar-nav" id="endpointNav"></nav>
      <div class="sidebar-footer">
        <button class="btn-secondary" onclick="logout()" style="width: 100%;">Change API Key</button>
      </div>
    </div>

    <div class="main-content">
      <div class="endpoint-header">
        <div>
          <div class="endpoint-title" id="endpointTitle">Select an endpoint</div>
          <div class="endpoint-path" id="endpointPath"></div>
          <div class="endpoint-desc" id="endpointDesc"></div>
        </div>
      </div>

      <div class="request-response-container">
        <div class="request-card">
          <div class="card-title">Request</div>
          <div id="requestFields"></div>
          <div class="btn-row">
            <button id="sendBtn" onclick="sendRequest()">Send Request</button>
            <button class="btn-secondary" onclick="clearResponse()">Clear</button>
          </div>
        </div>

        <div class="response-card">
          <div class="output-header">
            <div class="card-title" style="margin-bottom: 0;">Response</div>
            <span id="outputStatus" class="output-status">Ready</span>
          </div>
          <div id="responseBox" class="output-box"><pre style="color: var(--text-muted);">Response will appear here...</pre></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URLS = {
      openrouter: 'https://openrouter.ai/api/v1',
      chutes: 'https://chutes.ai/api/v1'
    };

    const ENDPOINTS = {
      openrouter: [
        {
          id: 'chat_completions',
          name: 'Chat Completions',
          method: 'POST',
          path: '/chat/completions',
          description: 'Generate chat completions for a given conversational context.',
          fields: [
            { name: 'model', type: 'model', required: true, hint: 'Select a model' },
            { name: 'messages', type: 'json', required: true, hint: 'JSON array or plain text (will be wrapped)' },
            { name: 'temperature', type: 'number', default: 0.7, hint: 'Sampling temperature (0-2)' },
            { name: 'max_tokens', type: 'number', default: 2048, hint: 'Maximum tokens to generate' },
            { name: 'top_p', type: 'number', hint: 'Nucleus sampling threshold' },
            { name: 'frequency_penalty', type: 'number', default: 0, hint: 'Frequency penalty (-2 to 2)' },
            { name: 'presence_penalty', type: 'number', default: 0, hint: 'Presence penalty (-2 to 2)' },
            { name: 'stop', type: 'text', hint: 'Up to 4 sequences where API will stop generating' },
            { name: 'stream', type: 'boolean', default: false, hint: 'Enable server-sent events' },
          ]
        },
        {
          id: 'models',
          name: 'List Models',
          method: 'GET',
          path: '/models',
          description: 'Get a list of all available models.',
          fields: []
        },
        {
          id: 'model_info',
          name: 'Model Info',
          method: 'GET',
          path: '/models/{model_id}',
          description: 'Get details about a specific model.',
          fields: [
            { name: 'model_id', type: 'text', required: true, hint: 'The model ID (e.g., anthropic/claude-3-5-sonnet)' }
          ]
        },
        {
          id: 'info',
          name: 'Instance Info',
          method: 'GET',
          path: '/info',
          description: 'Get information about the current OpenRouter instance.',
          fields: []
        },
        {
          id: 'rankings',
          name: 'Model Rankings',
          method: 'GET',
          path: '/rankings',
          description: 'Get the ranked list of models.',
          fields: []
        },
        {
          id: 'api_keys',
          name: 'API Keys',
          method: 'GET',
          path: '/api-keys',
          description: 'Get the user\'s API keys.',
          fields: []
        },
        {
          id: 'generate_key',
          name: 'Generate API Key',
          method: 'POST',
          path: '/api-keys',
          description: 'Create a new API key.',
          fields: [
            { name: 'name', type: 'text', hint: 'Optional name for the key' }
          ]
        },
        {
          id: 'delete_key',
          name: 'Delete API Key',
          method: 'DELETE',
          path: '/api-keys/{key_id}',
          description: 'Delete an API key.',
          fields: [
            { name: 'key_id', type: 'text', required: true, hint: 'The API key ID to delete' }
          ]
        }
      ],
      chutes: [
        {
          id: 'chat_completions',
          name: 'Chat Completions',
          method: 'POST',
          path: '/chat/completions',
          description: 'Generate chat completions.',
          fields: [
            { name: 'model_id', type: 'model', required: true, hint: 'Select a model' },
            { name: 'messages', type: 'json', required: true, hint: 'JSON array or plain text (will be wrapped)' },
            { name: 'temperature', type: 'number', default: 0.7, hint: 'Sampling temperature' },
            { name: 'max_tokens', type: 'number', default: 2048, hint: 'Maximum tokens' },
            { name: 'stream', type: 'boolean', default: false }
          ]
        },
        {
          id: 'models',
          name: 'List Models',
          method: 'GET',
          path: '/models',
          description: 'Get a list of all available models.',
          fields: []
        },
        {
          id: 'model_info',
          name: 'Model Info',
          method: 'GET',
          path: '/models/{model_id}',
          description: 'Get details about a specific model.',
          fields: [
            { name: 'model_id', type: 'text', required: true, hint: 'Model ID' }
          ]
        },
        {
          id: 'image_generation',
          name: 'Image Generation',
          method: 'POST',
          path: '/image/generation',
          description: 'Generate images from text prompts.',
          fields: [
            { name: 'model_id', type: 'model', required: true, hint: 'Select an image model' },
            { name: 'prompt', type: 'text', required: true, hint: 'Text description of desired image' },
            { name: 'num_images', type: 'number', default: 1, hint: 'Number of images to generate' },
            { name: 'aspect_ratio', type: 'text', hint: 'Aspect ratio (e.g., 1:1, 16:9)' },
            { name: 'resolution', type: 'text', hint: 'Resolution (e.g., 512x512, 1024x1024)' }
          ]
        },
        {
          id: 'embeddings',
          name: 'Embeddings',
          method: 'POST',
          path: '/embeddings',
          description: 'Generate embeddings for text.',
          fields: [
            { name: 'model_id', type: 'text', required: true, hint: 'Embedding model ID' },
            { name: 'text', type: 'text', required: true, hint: 'Text to embed' }
          ]
        }
      ]
    };

    let apiKey = '';
    let provider = '';
    let currentEndpoint = null;
    let models = [];

    async function fetchModels() {
      const baseUrl = API_URLS[provider];
      const response = await fetch(`${baseUrl}/models`, {
        headers: { 'Authorization': `Bearer ${apiKey}` }
      });
      if (!response.ok) throw new Error('Failed to fetch models');
      const data = await response.json();
      models = data.data || [];
      if (provider === 'openrouter') {
        models.sort((a, b) => {
          const aTop = a.id.includes('claude') || a.id.includes('gpt') || a.id.includes('sonnet');
          const bTop = b.id.includes('claude') || b.id.includes('gpt') || b.id.includes('sonnet');
          if (aTop && !bTop) return -1;
          if (!aTop && bTop) return 1;
          return 0;
        });
      }
    }

    function getModelPrice(model) {
      if (provider === 'openrouter') {
        const pricing = model.pricing || {};
        const prompt = pricing.prompt || 0;
        const completion = pricing.completion || 0;
        if (prompt === 0 && completion === 0) return 'Free';
        if (prompt === completion) return `$${(prompt * 1000000).toFixed(2)}/1M`;
        return `in: $${(prompt * 1000000).toFixed(2)} out: $${(completion * 1000000).toFixed(2)}`;
      } else {
        return model.pricing ? `$${model.pricing.toFixed(4)}/1M` : 'N/A';
      }
    }

    function toggleModelDropdown(fieldName) {
      const dropdown = document.getElementById(`dropdown_${fieldName}`);
      document.querySelectorAll('.model-select-dropdown').forEach(d => {
        if (d.id !== `dropdown_${fieldName}`) d.classList.remove('open');
      });
      dropdown.classList.toggle('open');
      if (dropdown.classList.contains('open')) {
        const searchInput = dropdown.querySelector('input');
        if (searchInput) searchInput.focus();
      }
    }

    function filterModels(fieldName, query) {
      renderModelDropdown(fieldName, query);
    }

    function selectModel(fieldName, modelId) {
      const model = models.find(m => m.id === modelId);
      if (!model) return;
      document.getElementById(`selected_${fieldName}`).value = modelId;
      document.getElementById(`input_${fieldName}`).value = model.name || modelId;
      document.getElementById(`price_${fieldName}`).textContent = getModelPrice(model);
      toggleModelDropdown(fieldName);
    }

    function renderModelDropdown(fieldName, filter = '') {
      const dropdown = document.getElementById(`dropdown_${fieldName}`);
      const filtered = models.filter(m => {
        const name = (m.name || m.id || '').toLowerCase();
        const id = (m.id || '').toLowerCase();
        const q = filter.toLowerCase();
        return !q || name.includes(q) || id.includes(q);
      });

      const selectedId = document.getElementById(`selected_${fieldName}`)?.value || '';

      let html = `<div class="model-select-search">
        <input type="text" placeholder="Search models..." onkeyup="filterModels('${fieldName}', this.value)" autofocus>
      </div>`;

      if (filtered.length === 0) {
        html += `<div class="model-option" style="color: var(--text-muted); cursor: default;">No models found</div>`;
      } else {
        const top = filtered.filter(m => m.id.includes('claude') || m.id.includes('gpt') || m.id.includes('sonnet'));
        const rest = filtered.filter(m => !m.id.includes('claude') && !m.id.includes('gpt') && !m.id.includes('sonnet'));

        if (top.length > 0) {
          html += `<div class="model-option-group">Popular</div>`;
          top.slice(0, 10).forEach(m => {
            const price = getModelPrice(m);
            const isSelected = m.id === selectedId;
            html += `<div class="model-option ${isSelected ? 'selected' : ''}" onclick="selectModel('${fieldName}', '${m.id.replace(/'/g, "\\'")}')">
              <div>
                <div class="model-option-name">${m.name || m.id}</div>
                <div class="model-option-id">${m.id}</div>
              </div>
              <div class="model-option-price">${price}</div>
            </div>`;
          });
        }

        if (rest.length > 0) {
          html += `<div class="model-option-group">Other Models</div>`;
          rest.slice(0, 90).forEach(m => {
            const price = getModelPrice(m);
            const isSelected = m.id === selectedId;
            html += `<div class="model-option ${isSelected ? 'selected' : ''}" onclick="selectModel('${fieldName}', '${m.id.replace(/'/g, "\\'")}')">
              <div>
                <div class="model-option-name">${m.name || m.id}</div>
                <div class="model-option-id">${m.id}</div>
              </div>
              <div class="model-option-price">${price}</div>
            </div>`;
          });
        }

        if (filtered.length > 100) {
          html += `<div class="model-option" style="color: var(--text-muted);">Showing 100 of ${filtered.length}</div>`;
        }
      }

      dropdown.innerHTML = html;
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.model-select-wrapper')) {
        document.querySelectorAll('.model-select-dropdown').forEach(d => d.classList.remove('open'));
      }
    });

    function updateKeyPlaceholder() {
      const prov = document.getElementById('providerSelect').value;
      document.getElementById('apiKeyInput').placeholder = prov === 'chutes' ? 'cpk_...' : 'sk-or-v1...';
    }

    function logout() {
      sessionStorage.removeItem('apiKey');
      sessionStorage.removeItem('provider');
      apiKey = '';
      provider = '';
      currentEndpoint = null;
      document.getElementById('mainApp').classList.add('hidden');
      document.getElementById('mainApp').style.display = 'none';
      document.getElementById('apiKeyModal').classList.remove('hidden');
      document.getElementById('apiKeyModal').style.display = 'flex';
      document.getElementById('apiKeyInput').value = '';
      document.getElementById('modalError').classList.add('hidden');
    }

    async function submitApiKey() {
      const key = document.getElementById('apiKeyInput').value.trim();
      const prov = document.getElementById('providerSelect').value;
      const errorEl = document.getElementById('modalError');
      const btn = document.getElementById('submitBtn');

      if (!key) {
        errorEl.textContent = 'Please enter an API key';
        errorEl.classList.remove('hidden');
        return;
      }

      apiKey = key;
      provider = prov;
      errorEl.classList.add('hidden');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>';

      try {
        await testConnection();
        await fetchModels();
        sessionStorage.setItem('apiKey', apiKey);
        sessionStorage.setItem('provider', provider);
        document.getElementById('apiKeyModal').classList.add('hidden');
        document.getElementById('apiKeyModal').style.display = 'none';
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('mainApp').style.display = 'flex';
        document.getElementById('sidebarProvider').textContent = provider.toUpperCase();
        renderEndpointNav();
        selectEndpoint(ENDPOINTS[provider][0]);
      } catch (err) {
        errorEl.textContent = 'Failed to connect. Check your API key.';
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Continue';
      }
    }

    async function testConnection() {
      const baseUrl = API_URLS[provider];
      const response = await fetch(`${baseUrl}/models`, {
        headers: { 'Authorization': `Bearer ${apiKey}` }
      });
      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.error?.message || 'Connection failed');
      }
    }

    function renderEndpointNav() {
      const nav = document.getElementById('endpointNav');
      const endpoints = ENDPOINTS[provider];

      const grouped = {
        'Chat': endpoints.filter(e => e.id.includes('chat')),
        'Models': endpoints.filter(e => e.id.includes('model') || e.id.includes('models')),
        'API Keys': endpoints.filter(e => e.id.includes('key')),
        'Other': endpoints.filter(e => !e.id.includes('chat') && !e.id.includes('model') && !e.id.includes('models') && !e.id.includes('key'))
      };

      let html = '';
      for (const [group, items] of Object.entries(grouped)) {
        if (items.length === 0) continue;
        html += `<div class="nav-section">
          <div class="nav-section-title">${group}</div>`;
        for (const ep of items) {
          const methodClass = ep.method.toLowerCase();
          html += `<div class="nav-item" data-endpoint="${ep.id}" onclick="selectEndpoint(ENDPOINTS['${provider}'].find(e => e.id === '${ep.id}'))">
            <span class="method method-${methodClass}">${ep.method}</span>
            <span>${ep.name}</span>
          </div>`;
        }
        html += '</div>';
      }

      nav.innerHTML = html;
    }

    function selectEndpoint(endpoint) {
      currentEndpoint = endpoint;

      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.querySelector(`[data-endpoint="${endpoint.id}"]`)?.classList.add('active');

      document.getElementById('endpointTitle').textContent = endpoint.name;
      document.getElementById('endpointPath').textContent = `${endpoint.method} ${endpoint.path}`;
      document.getElementById('endpointDesc').textContent = endpoint.description;

      renderRequestFields(endpoint);
      clearResponse();
    }

    const ADVANCED_FIELDS = ['temperature', 'max_tokens', 'top_p', 'frequency_penalty', 'presence_penalty', 'stop', 'stream'];

    function renderRequestFields(endpoint) {
      const container = document.getElementById('requestFields');

      if (endpoint.fields.length === 0) {
        if (endpoint.method === 'GET') {
          container.innerHTML = '<p style="color: var(--text-muted);">This endpoint has no parameters.</p>';
        } else {
          container.innerHTML = '<p style="color: var(--text-muted);">Send an empty request body.</p>';
        }
        return;
      }

      const basicFields = endpoint.fields.filter(f => !ADVANCED_FIELDS.includes(f.name));
      const advancedFields = endpoint.fields.filter(f => ADVANCED_FIELDS.includes(f.name));

      let html = '';

      html += '<div class="fields-grid">';

      for (const field of basicFields) {
        const value = field.default !== undefined ? (field.default === false ? 'false' : field.default) : '';

        if (field.type === 'json') {
          html += `<div class="field-group messages-field" style="grid-column: 1 / -1;">
            <label>${field.name} ${field.required ? '<span class="field-required">required</span>' : ''}</label>
            <textarea id="field_${field.name}" placeholder='[{"role": "user", "content": "Hello"}] or just type your message'>${value}</textarea>
            ${field.hint ? `<div class="field-hint">${field.hint}</div>` : ''}
          </div>`;
        } else if (field.type === 'model') {
          html += `<div class="field-group">
            <label>${field.name} ${field.required ? '<span class="field-required">required</span>' : ''}</label>
            <div class="model-select-wrapper">
              <input type="text" id="input_${field.name}" class="model-select-input" placeholder="Search models..." readonly onclick="toggleModelDropdown('${field.name}')">
              <input type="hidden" id="selected_${field.name}" value="">
              <div id="dropdown_${field.name}" class="model-select-dropdown"></div>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 6px;">
              <div class="field-hint">${field.hint || 'Click to select'}</div>
              <div class="model-option-price" id="price_${field.name}" style="font-size: 12px;"></div>
            </div>
          </div>`;
        } else {
          html += `<div class="field-group">
            <label>${field.name} ${field.required ? '<span class="field-required">required</span>' : ''}</label>
            <input type="text" id="field_${field.name}" placeholder="${field.hint || ''}" value="${value}">
            ${field.hint ? `<div class="field-hint">${field.hint}</div>` : ''}
          </div>`;
        }
      }

      html += '</div>';

      if (advancedFields.length > 0) {
        html += `<button class="advanced-toggle" onclick="toggleAdvanced()">
          <span class="arrow">▶</span> Advanced Options
        </button>`;

        html += '<div class="advanced-fields" id="advancedFields">';
        html += '<div class="fields-grid">';

        for (const field of advancedFields) {
          const value = field.default !== undefined ? (field.default === false ? 'false' : field.default) : '';

          if (field.type === 'boolean') {
            html += `<div class="field-group">
              <label style="display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="field_${field.name}" ${value === 'false' ? '' : 'checked'}>
                ${field.name} ${field.required ? '<span class="field-required">required</span>' : ''}
              </label>
              ${field.hint ? `<div class="field-hint">${field.hint}</div>` : ''}
            </div>`;
          } else if (field.type === 'number') {
            html += `<div class="field-group">
              <label>${field.name} ${field.required ? '<span class="field-required">required</span>' : ''}</label>
              <input type="number" id="field_${field.name}" value="${value}" step="any">
              ${field.hint ? `<div class="field-hint">${field.hint}</div>` : ''}
            </div>`;
          } else {
            html += `<div class="field-group">
              <label>${field.name} ${field.required ? '<span class="field-required">required</span>' : ''}</label>
              <input type="text" id="field_${field.name}" placeholder="${field.hint || ''}" value="${value}">
              ${field.hint ? `<div class="field-hint">${field.hint}</div>` : ''}
            </div>`;
          }
        }

        html += '</div></div>';
      }

      container.innerHTML = html;

      for (const field of endpoint.fields) {
        if (field.type === 'model') {
          renderModelDropdown(field.name);
        }
      }
    }

    function toggleAdvanced() {
      const toggle = document.querySelector('.advanced-toggle');
      const advanced = document.getElementById('advancedFields');
      toggle.classList.toggle('open');
      advanced.classList.toggle('open');
    }

    function buildRequestBody() {
      if (!currentEndpoint || currentEndpoint.fields.length === 0) {
        return {};
      }

      const body = {};
      for (const field of currentEndpoint.fields) {
        const el = document.getElementById(`field_${field.name}`);
        if (!el) continue;

        if (field.type === 'json') {
          const val = el.value.trim();
          if (val) {
            try {
              body[field.name] = JSON.parse(val);
            } catch {
              body[field.name] = [{ role: 'user', content: val }];
            }
          }
        } else if (field.type === 'boolean') {
          body[field.name] = el.checked;
        } else if (field.type === 'model') {
          const modelVal = document.getElementById(`selected_${field.name}`)?.value;
          if (modelVal) body[field.name] = modelVal;
        } else if (field.type === 'number') {
          const val = parseFloat(el.value);
          if (!isNaN(val)) body[field.name] = val;
        } else {
          const val = el.value.trim();
          if (val) body[field.name] = val;
        }
      }
      return body;
    }

    function buildPath(path, body) {
      let finalPath = path;
      const pathParams = path.match(/\{(\w+)\}/g) || [];
      for (const param of pathParams) {
        const key = param.replace(/[{}]/g, '');
        if (body[key]) {
          finalPath = finalPath.replace(param, body[key]);
          delete body[key];
        } else {
          const el = document.getElementById(`field_${key}`);
          if (el && el.value.trim()) {
            finalPath = finalPath.replace(param, el.value.trim());
          }
        }
      }
      return finalPath;
    }

    async function sendRequest() {
      if (!currentEndpoint) {
        alert('Please select an endpoint');
        return;
      }

      const baseUrl = API_URLS[provider];
      let body = buildRequestBody();
      if (body === null) return;

      const path = buildPath(currentEndpoint.path, body);
      const method = currentEndpoint.method;

      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true;
      sendBtn.innerHTML = '<span class="loading"></span>';

      const outputBox = document.getElementById('responseBox');
      const statusEl = document.getElementById('outputStatus');
      statusEl.textContent = 'Loading...';
      statusEl.className = 'output-status';
      outputBox.innerHTML = '<pre style="color: var(--text-muted);">Loading...</pre>';

      const hasBody = method !== 'GET' && Object.keys(body).length > 0;

      try {
        const options = {
          method,
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json',
            'HTTP-Referer': 'https://api-inference-manager.com',
            'X-Title': 'API Inference Manager'
          }
        };

        if (hasBody) {
          options.body = JSON.stringify(body);
        }

        const response = await fetch(`${baseUrl}${path}`, options);
        const contentType = response.headers.get('content-type');

        let data;
        if (contentType && contentType.includes('application/json')) {
          data = await response.json();
        } else {
          data = { raw: await response.text() };
        }

        if (!response.ok) {
          outputBox.innerHTML = `<pre style="color: var(--danger);">${JSON.stringify(data, null, 2)}</pre>`;
          statusEl.textContent = `${response.status} Error`;
          statusEl.className = 'output-status error';
          return;
        }

        outputBox.innerHTML = `<pre><code class="language-json">${JSON.stringify(data, null, 2)}</code></pre>`;
        hljs.highlightElement(outputBox.querySelector('code'));
        statusEl.textContent = `${response.status} OK`;
        statusEl.className = 'output-status success';
      } catch (err) {
        outputBox.innerHTML = `<pre style="color: var(--danger);">Error: ${err.message}</pre>`;
        statusEl.textContent = 'Error';
        statusEl.className = 'output-status error';
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send Request';
      }
    }

    function clearResponse() {
      document.getElementById('responseBox').innerHTML = '<pre style="color: var(--text-muted);">Response will appear here...</pre>';
      document.getElementById('outputStatus').textContent = 'Ready';
      document.getElementById('outputStatus').className = 'output-status';
    }

    function init() {
      const savedKey = sessionStorage.getItem('apiKey');
      const savedProvider = sessionStorage.getItem('provider');

      if (savedKey && savedProvider) {
        apiKey = savedKey;
        provider = savedProvider;
        document.getElementById('apiKeyModal').classList.add('hidden');
        document.getElementById('apiKeyModal').style.display = 'none';
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('mainApp').style.display = 'flex';
        document.getElementById('sidebarProvider').textContent = provider.toUpperCase();
        renderEndpointNav();
        fetchModels().then(() => selectEndpoint(ENDPOINTS[provider][0]));
      }
    }

    init();
  </script>
</body>
</html>
