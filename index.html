<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Inference Manager</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #0b1120;
      --bg-secondary: #111827;
      --bg-tertiary: #1f2937;
      --bg-elevated: #0f172a;
      --text-primary: #e5eefb;
      --text-secondary: #9caec8;
      --text-muted: #70819b;
      --accent: #5b7cfa;
      --accent-hover: #4d68e8;
      --accent-soft: rgba(91, 124, 250, 0.14);
      --success: #2dd4bf;
      --danger: #f87171;
      --border: rgba(148, 163, 184, 0.18);
      --shadow-lg: 0 24px 72px rgba(2, 8, 23, 0.45);
      --shadow-md: 0 12px 32px rgba(2, 8, 23, 0.28);
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background:
        linear-gradient(180deg, #09101d 0%, #0b1120 48%, #111827 100%);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      color-scheme: dark;
    }

    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.28);
      border-radius: 999px;
      border: 2px solid transparent;
      background-clip: content-box;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(148, 163, 184, 0.4);
      border: 2px solid transparent;
      background-clip: content-box;
    }

    .hidden {
      display: none !important;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(2, 6, 23, 0.74);
      backdrop-filter: blur(18px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .api-key-modal {
      width: min(100%, 440px);
      background: rgba(15, 23, 42, 0.94);
      border: 1px solid rgba(148, 163, 184, 0.22);
      border-radius: 20px;
      padding: 34px;
      box-shadow: var(--shadow-lg);
    }

    .api-key-modal h2 {
      font-size: 26px;
      line-height: 1.15;
      font-weight: 700;
      text-align: center;
      letter-spacing: 0;
      margin-bottom: 10px;
    }

    .api-key-modal p {
      color: var(--text-secondary);
      font-size: 14px;
      text-align: center;
      line-height: 1.5;
      margin-bottom: 26px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-secondary);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 12px 14px;
      background: rgba(15, 23, 42, 0.92);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, transform 0.18s ease;
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(112, 129, 155, 0.9);
    }

    input:hover,
    select:hover,
    textarea:hover {
      border-color: rgba(148, 163, 184, 0.3);
      background: rgba(15, 23, 42, 1);
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: none;
      border-color: rgba(91, 124, 250, 0.9);
      box-shadow: 0 0 0 4px rgba(91, 124, 250, 0.16);
      background: rgba(15, 23, 42, 1);
    }

    textarea {
      resize: vertical;
      min-height: 96px;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 18px;
      background: linear-gradient(180deg, #5b7cfa 0%, #4d68e8 100%);
      color: white;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease, opacity 0.18s ease;
      box-shadow: 0 10px 24px rgba(91, 124, 250, 0.24);
    }

    button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 14px 30px rgba(91, 124, 250, 0.32);
    }

    button:active:not(:disabled) {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      box-shadow: none;
      transform: none;
    }

    .btn-secondary {
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid var(--border);
      color: var(--text-primary);
      box-shadow: none;
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(30, 41, 59, 1);
      border-color: rgba(148, 163, 184, 0.28);
      box-shadow: none;
    }

    .error {
      color: var(--danger);
      font-size: 13px;
      margin-top: 10px;
      text-align: center;
      line-height: 1.45;
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.26);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    #mainApp {
      display: flex;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar {
      width: 304px;
      background: rgba(15, 23, 42, 0.88);
      border-right: 1px solid var(--border);
      height: 100vh;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      backdrop-filter: blur(10px);
    }

    .sidebar-header {
      padding: 22px 20px 18px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
    }

    .sidebar-header h1 {
      font-size: 15px;
      line-height: 1.2;
      font-weight: 700;
      letter-spacing: 0;
    }

    .sidebar-provider {
      display: inline-flex;
      align-items: center;
      margin-top: 10px;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(91, 124, 250, 0.14);
      border: 1px solid rgba(91, 124, 250, 0.2);
      color: #9fb2ff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .sidebar-nav {
      flex: 1;
      overflow-y: auto;
      padding: 14px 12px 12px;
    }

    .nav-section {
      margin-bottom: 14px;
    }

    .nav-section-title {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 10px 12px 8px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      border-radius: 12px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 13px;
      line-height: 1.35;
      transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      border: 1px solid transparent;
    }

    .nav-item:hover {
      background: rgba(30, 41, 59, 0.96);
      color: var(--text-primary);
      border-color: rgba(148, 163, 184, 0.12);
      transform: translateX(2px);
    }

    .nav-item.active {
      background: linear-gradient(180deg, rgba(91, 124, 250, 0.24) 0%, rgba(91, 124, 250, 0.16) 100%);
      color: white;
      border-color: rgba(91, 124, 250, 0.34);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
    }

    .nav-item .method {
      font-size: 10px;
      font-weight: 800;
      padding: 4px 7px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }

    .method-get {
      background: rgba(45, 212, 191, 0.16);
      color: #75e7d7;
    }

    .method-post {
      background: rgba(91, 124, 250, 0.18);
      color: #aabaff;
    }

    .method-delete {
      background: rgba(248, 113, 113, 0.18);
      color: #ffb0b0;
    }

    .nav-item.active .method {
      background: rgba(255, 255, 255, 0.16);
      color: white;
    }

    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid rgba(148, 163, 184, 0.12);
    }

    .main-content {
      flex: 1;
      padding: 28px 32px 30px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 20px;
      min-width: 0;
      min-height: 0;
    }

    .endpoint-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
    }

    .endpoint-title {
      font-size: 26px;
      line-height: 1.15;
      font-weight: 700;
      letter-spacing: 0;
    }

    .endpoint-path {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
      word-break: break-word;
    }

    .endpoint-desc {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.55;
      margin-top: 10px;
      max-width: 700px;
    }

    .request-response-container {
      display: grid;
      grid-template-columns: minmax(0, 1.15fr) minmax(0, 0.85fr);
      gap: 20px;
      flex: 1;
      min-height: 0;
    }

    @media (max-width: 1200px) {
      .request-response-container {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 900px) {
      .sidebar {
        width: 280px;
      }

      .main-content {
        padding: 20px;
      }
    }

    @media (max-width: 760px) {
      body {
        overflow: auto;
      }

      #mainApp {
        height: auto;
        min-height: 100vh;
        flex-direction: column;
        overflow: visible;
      }

      .sidebar {
        width: 100%;
        height: auto;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }

      .main-content {
        overflow: visible;
      }
    }

    .request-card,
    .response-card {
      background: rgba(15, 23, 42, 0.82);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      box-shadow: var(--shadow-md);
    }

    .request-card {
      gap: 16px;
    }

    .response-card {
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 14px;
      overflow: hidden;
    }

    .card-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .output-status {
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 999px;
      background: rgba(30, 41, 59, 0.95);
      color: var(--text-secondary);
      border: 1px solid rgba(148, 163, 184, 0.14);
      font-variant-numeric: tabular-nums;
    }

    .output-status.success {
      background: rgba(45, 212, 191, 0.14);
      color: #7df1e2;
      border-color: rgba(45, 212, 191, 0.18);
    }

    .output-status.error {
      background: rgba(248, 113, 113, 0.14);
      color: #ffb0b0;
      border-color: rgba(248, 113, 113, 0.18);
    }

    .output-box {
      background: rgba(4, 9, 20, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.14);
      border-radius: var(--radius-md);
      padding: 16px;
      overflow-y: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 13px;
      line-height: 1.65;
      flex: 1;
      min-height: 0;
    }

    .output-box pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .fields-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 16px;
      align-items: start;
    }

    .field-group {
      margin-bottom: 0;
    }

    .field-group label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      flex-wrap: wrap;
    }

    .field-required {
      font-size: 10px;
      padding: 3px 6px;
      background: rgba(248, 113, 113, 0.16);
      color: #ffb0b0;
      border-radius: 999px;
      line-height: 1;
    }

    .field-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 6px;
      line-height: 1.45;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: auto;
      padding-top: 6px;
    }

    .json-input {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 13px;
      min-height: 200px;
    }

    .model-select-wrapper {
      position: relative;
    }

    .model-select-input {
      cursor: pointer;
      background: rgba(15, 23, 42, 0.95) !important;
      padding-right: 42px;
    }

    .model-select-wrapper::after {
      content: '⌄';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-52%);
      color: var(--text-muted);
      pointer-events: none;
      font-size: 14px;
      line-height: 1;
    }

    .model-select-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      background: rgba(15, 23, 42, 0.98);
      border: 1px solid rgba(148, 163, 184, 0.16);
      border-radius: 14px;
      max-height: 320px;
      overflow-y: auto;
      z-index: 100;
      box-shadow: var(--shadow-lg);
      display: none;
    }

    .model-select-dropdown.open {
      display: block;
    }

    .model-select-search {
      position: sticky;
      top: 0;
      background: rgba(17, 24, 39, 0.98);
      padding: 10px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.12);
      z-index: 1;
    }

    .model-select-search input {
      border-radius: 10px;
    }

    .model-option {
      padding: 11px 14px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      transition: background 0.15s ease, color 0.15s ease;
      border-bottom: 1px solid rgba(148, 163, 184, 0.08);
    }

    .model-option:hover {
      background: rgba(30, 41, 59, 0.96);
    }

    .model-option.selected {
      background: linear-gradient(180deg, rgba(91, 124, 250, 0.24) 0%, rgba(91, 124, 250, 0.16) 100%);
      color: white;
    }

    .model-option-name {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.35;
    }

    .model-option-price {
      font-size: 11px;
      color: var(--text-muted);
      white-space: nowrap;
      flex-shrink: 0;
      padding-top: 1px;
    }

    .model-option.selected .model-option-price {
      color: rgba(255, 255, 255, 0.78);
    }

    .model-option-id {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 3px;
      line-height: 1.35;
      word-break: break-word;
    }

    .model-option.selected .model-option-id {
      color: rgba(255, 255, 255, 0.72);
    }

    .model-option-group {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-muted);
      padding: 10px 14px 6px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }

    .advanced-toggle {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: rgba(15, 23, 42, 0.95);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 600;
      width: 100%;
      margin-top: 2px;
      transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease, transform 0.18s ease;
    }

    .advanced-toggle:hover {
      background: rgba(30, 41, 59, 0.96);
      color: var(--text-primary);
      transform: translateY(-1px);
    }

    .advanced-toggle .arrow {
      transition: transform 0.2s ease;
      font-size: 10px;
    }

    .advanced-toggle.open .arrow {
      transform: rotate(90deg);
    }

    .advanced-toggle.open {
      background: rgba(91, 124, 250, 0.18);
      color: white;
      border-color: rgba(91, 124, 250, 0.34);
    }

    .advanced-fields {
      display: none;
      padding-top: 16px;
      margin-top: 16px;
      border-top: 1px solid rgba(148, 163, 184, 0.12);
    }

    .advanced-fields.open {
      display: block;
    }

    .messages-field textarea {
      min-height: 220px;
    }

    #requestFields {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding-right: 2px;
    }

    #responseBox {
      min-height: 0;
      overflow-y: auto;
      max-height: none;
    }

    .request-card p,
    .response-card p {
      color: var(--text-muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="apiKeyModal" class="modal-overlay">
    <div class="api-key-modal">
      <h2>API Inference Manager</h2>
      <p>Enter your API key to get started</p>
      <div class="form-group">
        <label>Provider</label>
        <select id="providerSelect" onchange="updateKeyPlaceholder()">
          <option value="openrouter">OpenRouter</option>
          <option value="chutes">Chutes</option>
        </select>
      </div>
      <div class="form-group">
        <label>API Key</label>
        <input type="password" id="apiKeyInput" placeholder="sk-or-v1..." onkeydown="if(event.key==='Enter')submitApiKey()">
      </div>
      <button id="submitBtn" onclick="submitApiKey()">Continue</button>
      <div id="modalError" class="error hidden"></div>
    </div>
  </div>

  <div id="mainApp" class="hidden" style="display: flex;">
    <div class="sidebar">
      <div class="sidebar-header">
        <h1>API Inference Manager</h1>
        <div class="sidebar-provider" id="sidebarProvider"></div>
      </div>
      <nav class="sidebar-nav" id="endpointNav"></nav>
      <div class="sidebar-footer">
        <button class="btn-secondary" onclick="logout()" style="width: 100%;">Change API Key</button>
      </div>
    </div>

    <div class="main-content">
      <div class="endpoint-header">
        <div>
          <div class="endpoint-title" id="endpointTitle">Select an endpoint</div>
          <div class="endpoint-path" id="endpointPath"></div>
          <div class="endpoint-desc" id="endpointDesc"></div>
        </div>
      </div>

      <div class="request-response-container">
        <div class="request-card">
          <div class="card-title">Request</div>
          <div id="requestFields"></div>
          <div class="btn-row">
            <button id="sendBtn" onclick="sendRequest()">Send Request</button>
            <button class="btn-secondary" onclick="clearResponse()">Clear</button>
          </div>
        </div>

        <div class="response-card">
          <div class="output-header">
            <div class="card-title" style="margin-bottom: 0;">Response</div>
            <span id="outputStatus" class="output-status">Ready</span>
          </div>
          <div id="responseBox" class="output-box"><pre style="color: var(--text-muted);">Response will appear here...</pre></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URLS = {
      openrouter: 'https://openrouter.ai/api/v1',
      chutes: 'https://llm.chutes.ai/v1'
    };

    const ENDPOINTS = {
      openrouter: [
        {
          id: 'chat_completions',
          name: 'Chat Completions',
          method: 'POST',
          path: '/chat/completions',
          description: 'Generate chat completions for a given conversational context.',
          fields: [
            { name: 'model', type: 'model', required: true, hint: 'Select a model' },
            { name: 'messages', type: 'json', required: true, hint: 'JSON array or plain text (will be wrapped)' },
            { name: 'temperature', type: 'number', default: 0.7, hint: 'Sampling temperature (0-2)' },
            { name: 'max_tokens', type: 'number', default: 2048, hint: 'Maximum tokens to generate' },
            { name: 'top_p', type: 'number', hint: 'Nucleus sampling threshold' },
            { name: 'frequency_penalty', type: 'number', default: 0, hint: 'Frequency penalty (-2 to 2)' },
            { name: 'presence_penalty', type: 'number', default: 0, hint: 'Presence penalty (-2 to 2)' },
            { name: 'stop', type: 'text', hint: 'Up to 4 sequences where API will stop generating' },
            { name: 'stream', type: 'boolean', default: false, hint: 'Enable server-sent events' },
          ]
        },
        {
          id: 'models',
          name: 'List Models',
          method: 'GET',
          path: '/models',
          description: 'Get a list of all available models.',
          fields: []
        },
        {
          id: 'model_info',
          name: 'Model Info',
          method: 'GET',
          path: '/models/{model_id}',
          description: 'Get details about a specific model.',
          fields: [
            { name: 'model_id', type: 'text', required: true, hint: 'The model ID (e.g., anthropic/claude-3-5-sonnet)' }
          ]
        },
        {
          id: 'info',
          name: 'Instance Info',
          method: 'GET',
          path: '/info',
          description: 'Get information about the current OpenRouter instance.',
          fields: []
        },
        {
          id: 'rankings',
          name: 'Model Rankings',
          method: 'GET',
          path: '/rankings',
          description: 'Get the ranked list of models.',
          fields: []
        },
        {
          id: 'api_keys',
          name: 'API Keys',
          method: 'GET',
          path: '/api-keys',
          description: 'Get the user\'s API keys.',
          fields: []
        },
        {
          id: 'generate_key',
          name: 'Generate API Key',
          method: 'POST',
          path: '/api-keys',
          description: 'Create a new API key.',
          fields: [
            { name: 'name', type: 'text', hint: 'Optional name for the key' }
          ]
        },
        {
          id: 'delete_key',
          name: 'Delete API Key',
          method: 'DELETE',
          path: '/api-keys/{key_id}',
          description: 'Delete an API key.',
          fields: [
            { name: 'key_id', type: 'text', required: true, hint: 'The API key ID to delete' }
          ]
        }
      ],
      chutes: [
        {
          id: 'chat_completions',
          name: 'Chat Completions',
          method: 'POST',
          path: '/chat/completions',
          description: 'Generate chat completions.',
          fields: [
            { name: 'model_id', type: 'model', required: true, hint: 'Select a model' },
            { name: 'messages', type: 'json', required: true, hint: 'JSON array or plain text (will be wrapped)' },
            { name: 'temperature', type: 'number', default: 0.7, hint: 'Sampling temperature' },
            { name: 'max_tokens', type: 'number', default: 2048, hint: 'Maximum tokens' },
            { name: 'stream', type: 'boolean', default: false }
          ]
        },
        {
          id: 'models',
          name: 'List Models',
          method: 'GET',
          path: '/models',
          description: 'Get a list of all available models.',
          fields: []
        },
        {
          id: 'model_info',
          name: 'Model Info',
          method: 'GET',
          path: '/models/{model_id}',
          description: 'Get details about a specific model.',
          fields: [
            { name: 'model_id', type: 'text', required: true, hint: 'Model ID' }
          ]
        },
        {
          id: 'image_generation',
          name: 'Image Generation',
          method: 'POST',
          path: '/image/generation',
          description: 'Generate images from text prompts.',
          fields: [
            { name: 'model_id', type: 'model', required: true, hint: 'Select an image model' },
            { name: 'prompt', type: 'text', required: true, hint: 'Text description of desired image' },
            { name: 'num_images', type: 'number', default: 1, hint: 'Number of images to generate' },
            { name: 'aspect_ratio', type: 'text', hint: 'Aspect ratio (e.g., 1:1, 16:9)' },
            { name: 'resolution', type: 'text', hint: 'Resolution (e.g., 512x512, 1024x1024)' }
          ]
        },
        {
          id: 'embeddings',
          name: 'Embeddings',
          method: 'POST',
          path: '/embeddings',
          description: 'Generate embeddings for text.',
          fields: [
            { name: 'model_id', type: 'text', required: true, hint: 'Embedding model ID' },
            { name: 'text', type: 'text', required: true, hint: 'Text to embed' }
          ]
        }
      ]
    };

    let apiKey = '';
    let provider = '';
    let currentEndpoint = null;
    let models = [];

    function normalizeModel(model) {
      const id = model?.id || model?.model_id || model?.slug || model?.name || '';
      const name = model?.name || model?.display_name || id;
      const pricing = model?.pricing ?? model?.price ?? model?.cost ?? null;
      return {
        ...model,
        id,
        name,
        pricing
      };
    }

    function getModelPriceValue(model) {
      if (provider === 'openrouter') {
        const pricing = model.pricing || {};
        const prompt = pricing.prompt || 0;
        const completion = pricing.completion || 0;
        if (prompt === 0 && completion === 0) return 0;
        return (prompt + completion) / 2;
      } else {
        return model.pricing || 999999;
      }
    }

    function getModelPrice(model) {
      if (provider === 'openrouter') {
        const pricing = model.pricing || {};
        const prompt = pricing.prompt || 0;
        const completion = pricing.completion || 0;
        if (prompt === 0 && completion === 0) return 'Free';
        if (prompt === completion) return `$${(prompt * 1000000).toFixed(2)}/1M`;
        return `in: $${(prompt * 1000000).toFixed(2)} out: $${(completion * 1000000).toFixed(2)}`;
      } else {
        return model.pricing ? `$${model.pricing.toFixed(4)}/1M` : 'N/A';
      }
    }

    async function fetchModels() {
      const baseUrl = API_URLS[provider];
      const response = await fetch(`${baseUrl}/models`, {
        headers: { 'Authorization': `Bearer ${apiKey}` }
      });
      if (!response.ok) throw new Error('Failed to fetch models');
      const data = await response.json();
      const rawModels = Array.isArray(data.data) ? data.data : Array.isArray(data.models) ? data.models : [];
      models = rawModels.map(normalizeModel).filter(m => m.id);
      models.sort((a, b) => getModelPriceValue(a) - getModelPriceValue(b));
    }

    function toggleModelDropdown(fieldName) {
      const dropdown = document.getElementById(`dropdown_${fieldName}`);
      document.querySelectorAll('.model-select-dropdown').forEach(d => {
        if (d.id !== `dropdown_${fieldName}`) d.classList.remove('open');
      });
      dropdown.classList.toggle('open');
      if (dropdown.classList.contains('open')) {
        const searchInput = dropdown.querySelector('input');
        if (searchInput) searchInput.focus();
      }
    }

    let modelSearchQueries = {};

    function filterModels(fieldName, query) {
      modelSearchQueries[fieldName] = query;
      renderModelDropdown(fieldName, query);
    }

    function selectModel(fieldName, modelId) {
      const model = models.find(m => m.id === modelId || m.model_id === modelId);
      if (!model) return;
      document.getElementById(`selected_${fieldName}`).value = modelId;
      document.getElementById(`input_${fieldName}`).value = model.name || modelId;
      document.getElementById(`price_${fieldName}`).textContent = getModelPrice(model);
      toggleModelDropdown(fieldName);
    }

    function renderModelDropdown(fieldName, filter = '') {
      const dropdown = document.getElementById(`dropdown_${fieldName}`);
      const filtered = models.filter(m => {
        const name = (m.name || m.id || '').toLowerCase();
        const id = (m.id || '').toLowerCase();
        const q = filter.toLowerCase();
        return !q || name.includes(q) || id.includes(q);
      });

      const selectedId = document.getElementById(`selected_${fieldName}`)?.value || '';
      const currentFilter = filter || modelSearchQueries[fieldName] || '';

      let html = `<div class="model-select-search">
        <input type="text" id="search_${fieldName}" placeholder="Search models..." value="${currentFilter}" oninput="filterModels('${fieldName}', this.value)" autofocus>
      </div>`;

      if (filtered.length === 0) {
        html += `<div class="model-option" style="color: var(--text-muted); cursor: default;">No models found</div>`;
      } else {
        filtered.slice(0, 100).forEach(m => {
          const price = getModelPrice(m);
          const isSelected = m.id === selectedId;
          html += `<div class="model-option ${isSelected ? 'selected' : ''}" onclick="selectModel('${fieldName}', '${m.id.replace(/'/g, "\\'")}')">
            <div>
              <div class="model-option-name">${m.name || m.id}</div>
              <div class="model-option-id">${m.id}</div>
            </div>
            <div class="model-option-price">${price}</div>
          </div>`;
        });

        if (filtered.length > 100) {
          html += `<div class="model-option" style="color: var(--text-muted);">Showing 100 of ${filtered.length}</div>`;
        }
      }

      dropdown.innerHTML = html;
    }

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.model-select-wrapper')) {
        document.querySelectorAll('.model-select-dropdown').forEach(d => d.classList.remove('open'));
      }
    });

    function updateKeyPlaceholder() {
      const prov = document.getElementById('providerSelect').value;
      document.getElementById('apiKeyInput').placeholder = prov === 'chutes' ? 'cpk_...' : 'sk-or-v1...';
    }

    function resetSubmitButton() {
      const btn = document.getElementById('submitBtn');
      if (!btn) return;
      btn.disabled = false;
      btn.textContent = 'Continue';
    }

    function setSubmitLoading(isLoading) {
      const btn = document.getElementById('submitBtn');
      if (!btn) return;
      btn.disabled = isLoading;
      btn.innerHTML = isLoading ? '<span class="loading"></span>' : 'Continue';
    }

    function logout() {
      sessionStorage.removeItem('apiKey');
      sessionStorage.removeItem('provider');
      apiKey = '';
      provider = '';
      currentEndpoint = null;
      document.getElementById('mainApp').classList.add('hidden');
      document.getElementById('mainApp').style.display = 'none';
      document.getElementById('apiKeyModal').classList.remove('hidden');
      document.getElementById('apiKeyModal').style.display = 'flex';
      document.getElementById('apiKeyInput').value = '';
      document.getElementById('modalError').classList.add('hidden');
      resetSubmitButton();
    }

    async function submitApiKey() {
      const btn = document.getElementById('submitBtn');
      if (btn?.disabled) return;

      const key = document.getElementById('apiKeyInput').value.trim();
      const prov = document.getElementById('providerSelect').value;
      const errorEl = document.getElementById('modalError');

      if (!key) {
        errorEl.textContent = 'Please enter an API key';
        errorEl.classList.remove('hidden');
        return;
      }

      apiKey = key;
      provider = prov;
      errorEl.classList.add('hidden');
      setSubmitLoading(true);

      try {
        await testConnection();
        await fetchModels();
        sessionStorage.setItem('apiKey', apiKey);
        sessionStorage.setItem('provider', provider);
        document.getElementById('apiKeyModal').classList.add('hidden');
        document.getElementById('apiKeyModal').style.display = 'none';
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('mainApp').style.display = 'flex';
        document.getElementById('sidebarProvider').textContent = provider.toUpperCase();
        renderEndpointNav();
        selectEndpoint(ENDPOINTS[provider][0]);
      } catch (err) {
        errorEl.textContent = 'Failed to connect. Check your API key.';
        errorEl.classList.remove('hidden');
        resetSubmitButton();
      }
    }

    async function testConnection() {
      const baseUrl = API_URLS[provider];
      const response = await fetch(`${baseUrl}/models`, {
        headers: { 'Authorization': `Bearer ${apiKey}` }
      });
      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.error?.message || 'Connection failed');
      }
    }

    function renderEndpointNav() {
      const nav = document.getElementById('endpointNav');
      const endpoints = ENDPOINTS[provider];

      const grouped = {
        'Chat': endpoints.filter(e => e.id.includes('chat')),
        'Models': endpoints.filter(e => e.id.includes('model') || e.id.includes('models')),
        'API Keys': endpoints.filter(e => e.id.includes('key')),
        'Other': endpoints.filter(e => !e.id.includes('chat') && !e.id.includes('model') && !e.id.includes('models') && !e.id.includes('key'))
      };

      let html = '';
      for (const [group, items] of Object.entries(grouped)) {
        if (items.length === 0) continue;
        html += `<div class="nav-section">
          <div class="nav-section-title">${group}</div>`;
        for (const ep of items) {
          const methodClass = ep.method.toLowerCase();
          html += `<div class="nav-item" data-endpoint="${ep.id}" onclick="selectEndpoint(ENDPOINTS['${provider}'].find(e => e.id === '${ep.id}'))">
            <span class="method method-${methodClass}">${ep.method}</span>
            <span>${ep.name}</span>
          </div>`;
        }
        html += '</div>';
      }

      nav.innerHTML = html;
    }

    function selectEndpoint(endpoint) {
      currentEndpoint = endpoint;

      document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
      document.querySelector(`[data-endpoint="${endpoint.id}"]`)?.classList.add('active');

      document.getElementById('endpointTitle').textContent = endpoint.name;
      document.getElementById('endpointPath').textContent = `${endpoint.method} ${endpoint.path}`;
      document.getElementById('endpointDesc').textContent = endpoint.description;

      renderRequestFields(endpoint);
      clearResponse();
    }

    const ADVANCED_FIELDS = ['temperature', 'max_tokens', 'top_p', 'frequency_penalty', 'presence_penalty', 'stop', 'stream'];

    function renderRequestFields(endpoint) {
      const container = document.getElementById('requestFields');

      if (endpoint.fields.length === 0) {
        if (endpoint.method === 'GET') {
          container.innerHTML = '<p style="color: var(--text-muted);">This endpoint has no parameters.</p>';
        } else {
          container.innerHTML = '<p style="color: var(--text-muted);">Send an empty request body.</p>';
        }
        return;
      }

      const basicFields = endpoint.fields.filter(f => !ADVANCED_FIELDS.includes(f.name));
      const advancedFields = endpoint.fields.filter(f => ADVANCED_FIELDS.includes(f.name));

      let html = '';

      html += '<div class="fields-grid">';

      for (const field of basicFields) {
        const value = field.default !== undefined ? (field.default === false ? 'false' : field.default) : '';

        if (field.type === 'json') {
          html += `<div class="field-group messages-field" style="grid-column: 1 / -1;">
            <label>${field.name} ${field.required ? '<span class="field-required">required</span>' : ''}</label>
            <textarea id="field_${field.name}" placeholder='[{"role": "user", "content": "Hello"}] or just type your message'>${value}</textarea>
            ${field.hint ? `<div class="field-hint">${field.hint}</div>` : ''}
          </div>`;
        } else if (field.type === 'model') {
          html += `<div class="field-group">
            <label>${field.name} ${field.required ? '<span class="field-required">required</span>' : ''}</label>
            <div class="model-select-wrapper">
              <input type="text" id="input_${field.name}" class="model-select-input" placeholder="Search models..." readonly onclick="toggleModelDropdown('${field.name}')">
              <input type="hidden" id="selected_${field.name}" value="">
              <div id="dropdown_${field.name}" class="model-select-dropdown"></div>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 6px;">
              <div class="field-hint">${field.hint || 'Click to select'}</div>
              <div class="model-option-price" id="price_${field.name}" style="font-size: 12px;"></div>
            </div>
          </div>`;
        } else {
          html += `<div class="field-group">
            <label>${field.name} ${field.required ? '<span class="field-required">required</span>' : ''}</label>
            <input type="text" id="field_${field.name}" placeholder="${field.hint || ''}" value="${value}">
            ${field.hint ? `<div class="field-hint">${field.hint}</div>` : ''}
          </div>`;
        }
      }

      html += '</div>';

      if (advancedFields.length > 0) {
        html += `<button class="advanced-toggle" onclick="toggleAdvanced()">
          <span class="arrow">▶</span> Advanced Options
        </button>`;

        html += '<div class="advanced-fields" id="advancedFields">';
        html += '<div class="fields-grid">';

        for (const field of advancedFields) {
          const value = field.default !== undefined ? (field.default === false ? 'false' : field.default) : '';

          if (field.type === 'boolean') {
            html += `<div class="field-group">
              <label style="display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="field_${field.name}" ${value === 'false' ? '' : 'checked'}>
                ${field.name} ${field.required ? '<span class="field-required">required</span>' : ''}
              </label>
              ${field.hint ? `<div class="field-hint">${field.hint}</div>` : ''}
            </div>`;
          } else if (field.type === 'number') {
            html += `<div class="field-group">
              <label>${field.name} ${field.required ? '<span class="field-required">required</span>' : ''}</label>
              <input type="number" id="field_${field.name}" value="${value}" step="any">
              ${field.hint ? `<div class="field-hint">${field.hint}</div>` : ''}
            </div>`;
          } else {
            html += `<div class="field-group">
              <label>${field.name} ${field.required ? '<span class="field-required">required</span>' : ''}</label>
              <input type="text" id="field_${field.name}" placeholder="${field.hint || ''}" value="${value}">
              ${field.hint ? `<div class="field-hint">${field.hint}</div>` : ''}
            </div>`;
          }
        }

        html += '</div></div>';
      }

      container.innerHTML = html;

      for (const field of endpoint.fields) {
        if (field.type === 'model') {
          renderModelDropdown(field.name);
        }
      }
    }

    function toggleAdvanced() {
      const toggle = document.querySelector('.advanced-toggle');
      const advanced = document.getElementById('advancedFields');
      toggle.classList.toggle('open');
      advanced.classList.toggle('open');
    }

    function buildRequestBody() {
      if (!currentEndpoint || currentEndpoint.fields.length === 0) {
        return {};
      }

      const body = {};
      for (const field of currentEndpoint.fields) {
        if (field.type === 'model') {
          const modelVal = document.getElementById(`selected_${field.name}`)?.value;
          if (modelVal) body[field.name] = modelVal;
          continue;
        }

        const el = document.getElementById(`field_${field.name}`);
        if (!el) continue;

        if (field.type === 'json') {
          const val = el.value.trim();
          if (val) {
            try {
              body[field.name] = JSON.parse(val);
            } catch {
              body[field.name] = [{ role: 'user', content: val }];
            }
          }
        } else if (field.type === 'boolean') {
          body[field.name] = el.checked;
        } else if (field.type === 'number') {
          const val = parseFloat(el.value);
          if (!isNaN(val)) body[field.name] = val;
        } else {
          const val = el.value.trim();
          if (val) body[field.name] = val;
        }
      }
      return body;
    }

    function buildPath(path, body) {
      let finalPath = path;
      const pathParams = path.match(/\{(\w+)\}/g) || [];
      for (const param of pathParams) {
        const key = param.replace(/[{}]/g, '');
        if (body[key]) {
          finalPath = finalPath.replace(param, body[key]);
          delete body[key];
        } else {
          const el = document.getElementById(`field_${key}`);
          if (el && el.value.trim()) {
            finalPath = finalPath.replace(param, el.value.trim());
          }
        }
      }
      return finalPath;
    }

    async function sendRequest() {
      if (!currentEndpoint) {
        alert('Please select an endpoint');
        return;
      }

      const baseUrl = API_URLS[provider];
      let body = buildRequestBody();
      if (body === null) return;

      const path = buildPath(currentEndpoint.path, body);
      const method = currentEndpoint.method;

      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true;
      sendBtn.innerHTML = '<span class="loading"></span>';

      const outputBox = document.getElementById('responseBox');
      const statusEl = document.getElementById('outputStatus');
      statusEl.textContent = 'Loading...';
      statusEl.className = 'output-status';
      outputBox.innerHTML = '<pre style="color: var(--text-muted);">Loading...</pre>';

      const hasBody = method !== 'GET' && Object.keys(body).length > 0;

      try {
        const options = {
          method,
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json',
            'HTTP-Referer': 'https://api-inference-manager.com',
            'X-Title': 'API Inference Manager'
          }
        };

        if (hasBody) {
          options.body = JSON.stringify(body);
        }

        const response = await fetch(`${baseUrl}${path}`, options);
        const contentType = response.headers.get('content-type');

        let data;
        if (contentType && contentType.includes('application/json')) {
          data = await response.json();
        } else {
          data = { raw: await response.text() };
        }

        if (!response.ok) {
          outputBox.innerHTML = `<pre style="color: var(--danger);">${JSON.stringify(data, null, 2)}</pre>`;
          statusEl.textContent = `${response.status} Error`;
          statusEl.className = 'output-status error';
          return;
        }

        outputBox.innerHTML = `<pre><code class="language-json">${JSON.stringify(data, null, 2)}</code></pre>`;
        hljs.highlightElement(outputBox.querySelector('code'));
        statusEl.textContent = `${response.status} OK`;
        statusEl.className = 'output-status success';
      } catch (err) {
        outputBox.innerHTML = `<pre style="color: var(--danger);">Error: ${err.message}</pre>`;
        statusEl.textContent = 'Error';
        statusEl.className = 'output-status error';
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send Request';
      }
    }

    function clearResponse() {
      document.getElementById('responseBox').innerHTML = '<pre style="color: var(--text-muted);">Response will appear here...</pre>';
      document.getElementById('outputStatus').textContent = 'Ready';
      document.getElementById('outputStatus').className = 'output-status';
    }

    function init() {
      const savedKey = sessionStorage.getItem('apiKey');
      const savedProvider = sessionStorage.getItem('provider');

      if (savedKey && savedProvider) {
        apiKey = savedKey;
        provider = savedProvider;
        document.getElementById('apiKeyModal').classList.add('hidden');
        document.getElementById('apiKeyModal').style.display = 'none';
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('mainApp').style.display = 'flex';
        document.getElementById('sidebarProvider').textContent = provider.toUpperCase();
        renderEndpointNav();
        fetchModels().then(() => selectEndpoint(ENDPOINTS[provider][0]));
      }
    }

    init();
  </script>
</body>
</html>
