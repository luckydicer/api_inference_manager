<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>API Inference Manager</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --success: #22c55e;
      --danger: #ef4444;
      --border: #334155;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .api-key-modal {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
      width: 100%;
      max-width: 420px;
      z-index: 1001;
    }
    .api-key-modal h2 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
      text-align: center;
    }
    .api-key-modal p {
      color: var(--text-secondary);
      font-size: 14px;
      text-align: center;
      margin-bottom: 24px;
    }
    .form-group { margin-bottom: 16px; }
    label {
      display: block;
      margin-bottom: 6px;
      color: var(--text-secondary);
      font-size: 13px;
      font-weight: 500;
    }
    input, select {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }
    button {
      width: 100%;
      padding: 12px 20px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    button:hover { background: var(--accent-hover); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: var(--danger); font-size: 13px; margin-top: 8px; text-align: center; }
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
    }
    .header-title { font-size: 18px; font-weight: 700; }
    .header-provider { color: var(--accent); font-size: 12px; font-weight: 500; }
    .main-content { padding: 24px; max-width: 1200px; margin: 0 auto; }
    .config-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
    }
    .config-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
    }
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .chat-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 900px) { .chat-container { grid-template-columns: 1fr; } }
    .chat-card, .response-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .chat-messages {
      height: 400px;
      overflow-y: auto;
      padding: 16px;
      background: var(--bg-tertiary);
      border-radius: 10px;
      margin-bottom: 16px;
    }
    .chat-message {
      padding: 12px 16px;
      border-radius: 12px;
      margin-bottom: 12px;
      max-width: 85%;
      line-height: 1.5;
    }
    .chat-message.user {
      background: var(--accent);
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    .chat-message.assistant {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
    }
    textarea {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      resize: vertical;
      min-height: 80px;
      margin-bottom: 12px;
    }
    textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }
    .btn-row { display: flex; gap: 12px; }
    .btn-secondary {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--border); }
    .output-box {
      background: #0d1117;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px;
      min-height: 400px;
      max-height: 500px;
      overflow-y: auto;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 13px;
      line-height: 1.6;
    }
    .output-box pre { margin: 0; white-space: pre-wrap; word-break: break-word; }
    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .output-status {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--bg-tertiary);
      color: var(--text-secondary);
    }
    .output-status.success { background: rgba(34, 197, 94, 0.2); color: var(--success); }
    .output-status.error { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div id="apiKeyModal" class="modal-overlay">
    <div class="api-key-modal">
      <h2>API Inference Manager</h2>
      <p>Enter your API key to get started</p>
      <div class="form-group">
        <label>Provider</label>
        <select id="providerSelect">
          <option value="openrouter">OpenRouter</option>
          <option value="chutes">Chutes</option>
        </select>
      </div>
      <div class="form-group">
        <label>API Key</label>
        <input type="password" id="apiKeyInput" placeholder="sk-or-..." onkeydown="if(event.key==='Enter')submitApiKey()">
      </div>
      <button id="submitBtn" onclick="submitApiKey()">Continue</button>
      <div id="modalError" class="error hidden"></div>
    </div>
  </div>

  <div id="mainApp" class="hidden">
    <div class="header-bar">
      <div>
        <div class="header-title">API Inference Manager</div>
        <div class="header-provider" id="headerProvider"></div>
      </div>
      <button class="btn-secondary" onclick="logout()" style="width: auto; padding: 8px 16px;">Change API Key</button>
    </div>

    <div class="main-content">
      <div class="config-card">
        <div class="card-title">Configuration</div>
        <div class="config-row">
          <div class="form-group">
            <label>Provider</label>
            <select id="appProviderSelect" onchange="onProviderChange()">
              <option value="openrouter">OpenRouter</option>
              <option value="chutes">Chutes</option>
            </select>
          </div>
          <div class="form-group">
            <label>Model</label>
            <select id="modelSelect">
              <option value="">Select model...</option>
            </select>
          </div>
          <div class="form-group">
            <label>Temperature</label>
            <input type="number" id="temperature" value="0.7" min="0" max="2" step="0.1">
          </div>
          <div class="form-group">
            <label>Max Tokens</label>
            <input type="number" id="maxTokens" value="2048" min="1" max="32000">
          </div>
        </div>
      </div>

      <div class="chat-container">
        <div class="chat-card">
          <div class="output-header">
            <div class="card-title">Chat</div>
          </div>
          <div id="chatMessages" class="chat-messages"></div>
          <textarea id="promptInput" placeholder="Enter your message..." onkeydown="if(event.key==='Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); }"></textarea>
          <div class="btn-row">
            <button id="sendBtn" onclick="sendMessage()">Send</button>
            <button class="btn-secondary" onclick="clearChat()">Clear</button>
          </div>
        </div>

        <div class="response-card">
          <div class="output-header">
            <div class="card-title">Response</div>
            <span id="outputStatus" class="output-status">Ready</span>
          </div>
          <div id="outputBox" class="output-box"><pre style="color: var(--text-muted);">Response will appear here...</pre></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_URLS = {
      openrouter: 'https://openrouter.ai/api/v1',
      chutes: 'https://chutes.ai/api/v1'
    };

    let apiKey = '';
    let provider = '';
    let models = [];
    let chatHistory = [];

    function logout() {
      sessionStorage.removeItem('apiKey');
      sessionStorage.removeItem('provider');
      sessionStorage.removeItem('chatHistory');
      chatHistory = [];
      document.getElementById('mainApp').classList.add('hidden');
      document.getElementById('apiKeyModal').classList.remove('hidden');
      document.getElementById('apiKeyInput').value = '';
      document.getElementById('modalError').classList.add('hidden');
    }

    async function submitApiKey() {
      const key = document.getElementById('apiKeyInput').value.trim();
      const prov = document.getElementById('providerSelect').value;
      const errorEl = document.getElementById('modalError');
      const btn = document.getElementById('submitBtn');

      if (!key) {
        errorEl.textContent = 'Please enter an API key';
        errorEl.classList.remove('hidden');
        return;
      }

      apiKey = key;
      provider = prov;
      errorEl.classList.add('hidden');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>';

      try {
        await loadModels();
        sessionStorage.setItem('apiKey', apiKey);
        sessionStorage.setItem('provider', provider);
        document.getElementById('apiKeyModal').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('appProviderSelect').value = provider;
        document.getElementById('headerProvider').textContent = provider.toUpperCase();
      } catch (err) {
        errorEl.textContent = 'Failed to load models. Check your API key.';
        errorEl.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Continue';
      }
    }

    async function loadModels() {
      const baseUrl = API_URLS[provider];
      const response = await fetch(`${baseUrl}/models`, {
        headers: { 'Authorization': `Bearer ${apiKey}` }
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.error?.message || 'Failed to fetch models');
      }

      const data = await response.json();
      models = data.data || [];

      const modelSelect = document.getElementById('modelSelect');
      if (provider === 'openrouter') {
        models.sort((a, b) => (b.id.includes('claude') || b.id.includes('gpt') ? -1 : 0));
        modelSelect.innerHTML = '<option value="">Select model...</option>' +
          models.map(m => `<option value="${m.id}">${m.name || m.id}</option>`).join('');
      } else {
        modelSelect.innerHTML = '<option value="">Select model...</option>' +
          models.slice(0, 50).map(m => `<option value="${m.id}">${m.name || m.id}</option>`).join('');
      }
    }

    function onProviderChange() {
      provider = document.getElementById('appProviderSelect').value;
      document.getElementById('headerProvider').textContent = provider.toUpperCase();
      sessionStorage.setItem('provider', provider);
      loadModels();
    }

    async function sendMessage() {
      const model = document.getElementById('modelSelect').value;
      const prompt = document.getElementById('promptInput').value.trim();
      const temperature = parseFloat(document.getElementById('temperature').value);
      const maxTokens = parseInt(document.getElementById('maxTokens').value);

      if (!model) { alert('Please select a model'); return; }
      if (!prompt) { alert('Please enter a message'); return; }

      const sendBtn = document.getElementById('sendBtn');
      sendBtn.disabled = true;
      sendBtn.innerHTML = '<span class="loading"></span>';

      const outputBox = document.getElementById('outputBox');
      const statusEl = document.getElementById('outputStatus');
      statusEl.textContent = 'Loading...';
      statusEl.className = 'output-status';

      chatHistory.push({ role: 'user', content: prompt });
      renderChat();

      document.getElementById('promptInput').value = '';

      try {
        const baseUrl = API_URLS[provider];
        let body;
        let endpoint = '/chat/completions';

        if (provider === 'openrouter') {
          body = { model, messages: chatHistory, temperature, max_tokens: maxTokens };
        } else {
          body = { model_id: model, messages: chatHistory, temperature, max_tokens: maxTokens };
        }

        const response = await fetch(`${baseUrl}${endpoint}`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': `Bearer ${apiKey}`,
            'HTTP-Referer': 'https://api-inference-manager.com',
            'X-Title': 'API Inference Manager'
          },
          body: JSON.stringify(body)
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error?.message || 'API request failed');
        }

        const content = data.choices?.[0]?.message?.content || '';
        if (content) {
          chatHistory.push({ role: 'assistant', content });
          renderChat();
        }

        outputBox.innerHTML = `<pre><code class="language-json">${JSON.stringify(data, null, 2)}</code></pre>`;
        hljs.highlightElement(outputBox.querySelector('code'));
        statusEl.textContent = 'Success';
        statusEl.className = 'output-status success';
      } catch (err) {
        outputBox.innerHTML = `<pre style="color: var(--danger);">Error: ${err.message}</pre>`;
        statusEl.textContent = 'Error';
        statusEl.className = 'output-status error';
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send';
        sessionStorage.setItem('chatHistory', JSON.stringify(chatHistory));
      }
    }

    function renderChat() {
      const container = document.getElementById('chatMessages');
      container.innerHTML = chatHistory.map(m => `
        <div class="chat-message ${m.role}">${m.content}</div>
      `).join('');
      container.scrollTop = container.scrollHeight;
    }

    function clearChat() {
      chatHistory = [];
      sessionStorage.removeItem('chatHistory');
      renderChat();
      document.getElementById('outputBox').innerHTML = '<pre style="color: var(--text-muted);">Response will appear here...</pre>';
      document.getElementById('outputStatus').textContent = 'Ready';
      document.getElementById('outputStatus').className = 'output-status';
    }

    function init() {
      const savedKey = sessionStorage.getItem('apiKey');
      const savedProvider = sessionStorage.getItem('provider');
      const savedHistory = sessionStorage.getItem('chatHistory');

      if (savedKey && savedProvider) {
        apiKey = savedKey;
        provider = savedProvider;
        document.getElementById('apiKeyModal').classList.add('hidden');
        document.getElementById('mainApp').classList.remove('hidden');
        document.getElementById('appProviderSelect').value = provider;
        document.getElementById('headerProvider').textContent = provider.toUpperCase();

        loadModels().then(() => {
          if (savedHistory) {
            chatHistory = JSON.parse(savedHistory);
            renderChat();
          }
        });
      }
    }

    init();
  </script>
</body>
</html>
